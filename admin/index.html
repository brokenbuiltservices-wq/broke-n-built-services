<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Broke N Built Services</title>
  <link rel="icon" type="image/png" href="../images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="admin-login-page">
    <div class="admin-login-card">
      <div class="admin-login-header">          <div class="admin-logo">
            <i class="fas fa-hammer"></i>
            <div class="admin-logo-text">
              <span class="logo-line1">Broke N Built</span>
              <span class="logo-line2">SERVICES</span>
            </div>
          </div>
        <h1>Admin Panel</h1>
        <p>Sign in to manage your projects</p>
      </div>
      <form class="admin-login-form" id="loginForm">
        <div class="form-group">
          <label for="password">
            <i class="fas fa-lock"></i> Admin Password
          </label>
          <input type="password" id="password" placeholder="Enter admin password" required />
        </div>
        <div class="form-status" id="loginStatus"></div>
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>
      <div class="admin-login-footer">
        <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
